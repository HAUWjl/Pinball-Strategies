<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>弹珠机策略顾问</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --green: #4ecca3;
    --yellow: #f0c040;
    --text: #eee;
    --muted: #999;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 12px;
    padding-bottom: 80px;
    -webkit-tap-highlight-color: transparent;
  }
  h1 { text-align: center; font-size: 1.4em; margin: 8px 0 16px; }
  h2 { font-size: 1.1em; margin-bottom: 10px; color: var(--green); }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  label { display: block; font-size: 0.9em; margin: 8px 0 4px; color: var(--muted); }
  input[type=number], select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #333;
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 1em;
    -webkit-appearance: none;
  }
  input[type=number]:focus, select:focus {
    outline: none;
    border-color: var(--green);
  }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  button {
    display: block;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity .2s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { opacity: 0.7; }
  .btn-primary { background: var(--green); color: #111; }
  .btn-accent  { background: var(--highlight); color: #fff; }
  .btn-small   { padding: 8px 12px; font-size: 0.85em; width: auto; display: inline-block; margin: 3px; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
  }

  .slot-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 8px 0;
  }
  .slot-btn {
    padding: 12px 0;
    border-radius: 8px;
    border: 2px solid #444;
    background: var(--bg);
    color: var(--text);
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .slot-btn.selected {
    background: var(--green);
    color: #111;
    border-color: var(--green);
  }
  .slot-btn:active { opacity: 0.7; }

  .mult-row {
    display: flex;
    gap: 8px;
    margin: 8px 0;
  }
  .mult-btn {
    flex: 1;
    padding: 12px 0;
    border-radius: 8px;
    border: 2px solid #444;
    background: var(--bg);
    color: var(--text);
    font-size: 1.1em;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }
  .mult-btn.selected {
    background: var(--highlight);
    color: #fff;
    border-color: var(--highlight);
  }

  .result-box {
    background: var(--accent);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 12px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 0.95em;
  }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: var(--muted); }
  .result-value { font-weight: 600; }
  .big-number {
    font-size: 2em;
    font-weight: 800;
    text-align: center;
    color: var(--green);
    padding: 12px 0;
  }
  .tip {
    text-align: center;
    font-size: 0.9em;
    padding: 6px;
    border-radius: 6px;
    margin-top: 8px;
  }
  .tip-good { background: rgba(78,204,163,0.15); color: var(--green); }
  .tip-bad  { background: rgba(233,69,96,0.15); color: var(--highlight); }
  .tip-even { background: rgba(240,192,64,0.15); color: var(--yellow); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
    margin-top: 8px;
  }
  th, td {
    padding: 6px 4px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  th { color: var(--muted); font-weight: 600; }
  .ev-good { color: var(--green); }
  .ev-bad  { color: var(--yellow); }

  .prob-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 4px 0;
    font-size: 0.85em;
  }
  .prob-label { width: 32px; text-align: right; color: var(--muted); }
  .prob-bar {
    height: 16px;
    background: var(--green);
    border-radius: 3px;
    transition: width .3s;
  }
  .prob-val { width: 50px; font-size: 0.8em; color: var(--muted); }

  .hidden { display: none; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    background: var(--green);
    color: #111;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.9em;
    opacity: 0;
    transition: opacity .3s;
    z-index: 99;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .section-toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    padding: 4px 0;
    -webkit-tap-highlight-color: transparent;
  }
  .section-toggle::after {
    content: '▼';
    font-size: 0.7em;
    color: var(--muted);
    transition: transform .2s;
  }
  .section-toggle.collapsed::after { transform: rotate(-90deg); }

  .history-item {
    font-size: 0.85em;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
  }
  .history-item .win { color: var(--green); }
  .history-item .lose { color: var(--muted); }

  /* Machine selection */
  .machine-list { display: flex; flex-direction: column; gap: 10px; margin: 10px 0; }
  .machine-card {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--accent); border-radius: 10px; padding: 14px 16px;
    cursor: pointer; transition: background .15s, border-color .15s;
    border: 2px solid transparent;
  }
  .machine-card:active { opacity: 0.7; }
  .machine-card .mc-info { flex: 1; }
  .machine-card .mc-name { font-weight: 700; font-size: 1.05em; }
  .machine-card .mc-detail { font-size: 0.8em; color: var(--muted); margin-top: 4px; }
  .machine-card .mc-del {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(233,69,96,0.2); color: var(--highlight);
    font-size: 1.1em; cursor: pointer; flex-shrink: 0; margin-left: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .machine-card .mc-del:active { background: rgba(233,69,96,0.5); }
  .add-machine-row {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .add-machine-row input {
    flex: 1; padding: 10px 12px; border: 1px solid #333;
    border-radius: 8px; background: var(--bg); color: var(--text); font-size: 1em;
  }
  .add-machine-row input:focus { outline: none; border-color: var(--green); }
</style>
</head>
<body>

<h1>🎯 弹珠机策略顾问</h1>

<!-- ====== Step 0: 机器选择 ====== -->
<div id="machinePanel" class="card">
  <h2>🎰 选择机器</h2>
  <div id="machineList" class="machine-list"></div>
  <div id="machineEmpty" style="text-align:center;color:var(--muted);font-size:0.9em;padding:12px;">暂无机器，请添加</div>
  <div class="add-machine-row">
    <input type="text" id="newMachineName" placeholder="输入机器编号/名称" maxlength="30">
    <button class="btn-primary" style="width:auto;padding:10px 20px;margin:0;" onclick="addMachine()">添加</button>
  </div>
</div>

<!-- ====== Step 1: 配置 ====== -->
<div id="setupPanel" class="card hidden">
  <h2>⚙️ 机器参数</h2>
  <div class="row">
    <div>
      <label>T（积分卡分母）</label>
      <input type="number" id="inputT" value="30" min="1" max="9999" inputmode="numeric">
    </div>
    <div>
      <label>J（单次最大卡数）</label>
      <input type="number" id="inputJ" value="3" min="1" max="9999" inputmode="numeric">
    </div>
  </div>
  <div class="row">
    <div>
      <label>优先目标</label>
      <select id="inputPriority">
        <option value="cards">积分卡优先</option>
        <option value="marbles">珠子收益优先</option>
      </select>
    </div>
    <div>
      <label>先验强度</label>
      <input type="number" id="inputPrior" value="24" min="0" max="9999" inputmode="numeric">
    </div>
  </div>
  <button class="btn-primary" onclick="initMachine()">开始使用</button>
</div>

<!-- ====== Step 2: 游戏界面 ====== -->
<div id="gamePanel" class="hidden">
  <div class="card" style="padding:10px 16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.85em;">
      <span id="configSummary" style="color:var(--muted);"></span>
      <button class="btn-small btn-outline" onclick="resetSetup()">返回首页</button>
    </div>
  </div>

  <!-- 新一局 -->
  <div class="card">
    <h2>🎲 新一局</h2>
    <label>选择倍数</label>
    <div class="mult-row" id="multRow"></div>
    <label>选择亮灯槽位（<span id="litCount">-</span> 个）</label>
    <div class="slot-grid" id="slotGrid"></div>
    <button class="btn-accent" onclick="getRecommendation()">获取策略建议</button>
  </div>

  <!-- 结果 -->
  <div id="resultPanel" class="card hidden">
    <h2>📊 策略建议</h2>
    <div class="big-number" id="betAdvice"></div>
    <div style="text-align:center;color:var(--muted);font-size:0.85em;margin-top:-8px;">建议投珠数</div>
    <div class="result-box">
      <div class="result-row">
        <span class="result-label">中奖概率</span>
        <span class="result-value" id="resWinProb"></span>
      </div>
      <div class="result-row">
        <span class="result-label">期望返珠</span>
        <span class="result-value" id="resExpMarbles"></span>
      </div>
      <div class="result-row">
        <span class="result-label">期望积分卡</span>
        <span class="result-value" id="resExpCards"></span>
      </div>
      <div class="result-row">
        <span class="result-label">珠子ROI</span>
        <span class="result-value" id="resROI"></span>
      </div>
    </div>
    <div id="resTip" class="tip"></div>

    <div style="margin-top:14px;">
      <label>记录落点（可选，提高后续精度）</label>
      <div class="slot-grid" id="recordGrid"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn-small btn-primary" onclick="recordSlot()">记录落点</button>
        <button class="btn-small btn-outline" onclick="skipRecord()">跳过</button>
      </div>
    </div>
  </div>

  <!-- 落点概率 -->
  <div class="card">
    <div class="section-toggle" onclick="toggleSection(this, 'probContent')">
      <h2 style="margin:0;">📈 落点概率分布</h2>
    </div>
    <div id="probContent">
      <div id="probBars"></div>
      <div id="probInfo" style="text-align:center;font-size:0.85em;color:var(--muted);margin-top:6px;"></div>
    </div>
  </div>

  <!-- EV 表 -->
  <div class="card">
    <div class="section-toggle" onclick="toggleSection(this, 'evContent')">
      <h2 style="margin:0;">📋 基准期望值表</h2>
    </div>
    <div id="evContent">
      <table id="evTable">
        <thead>
          <tr><th>倍数</th><th>亮灯</th><th>中奖率</th><th>ROI</th><th>最优投</th><th>每珠积分</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <div class="section-toggle collapsed" onclick="toggleSection(this, 'historyContent')">
      <h2 style="margin:0;">📝 游戏历史</h2>
    </div>
    <div id="historyContent" style="display:none;">
      <div id="historyList" style="max-height:200px;overflow-y:auto;"></div>
      <div id="historyEmpty" style="text-align:center;color:var(--muted);font-size:0.85em;padding:8px;">暂无记录</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// Pinball Strategy Engine (pure JavaScript, mirrors pinball_strategy.py)
// ═══════════════════════════════════════════════════════════════════
const NUM_SLOTS = 12;
const MIN_BET = 5;
const MAX_BET = 99;
const MULT_SLOTS = {2:4, 4:3, 6:2, 8:1, 10:1};

class PinballStrategy {
  constructor(T, J, priority, priorWeight) {
    this.T = T;
    this.J = J;
    this.priority = priority;
    this.priorWeight = priorWeight;
    this.landingCounts = new Array(NUM_SLOTS).fill(0);
    this.totalPlays = 0;
  }

  getLandingProbs() {
    const alpha = this.priorWeight / NUM_SLOTS;
    const total = this.priorWeight + this.totalPlays;
    if (total === 0) return new Array(NUM_SLOTS).fill(1.0 / NUM_SLOTS);
    return this.landingCounts.map(c => (alpha + c) / total);
  }

  recordLanding(slot) {
    if (slot < 0 || slot >= NUM_SLOTS) return;
    this.landingCounts[slot]++;
    this.totalPlays++;
    this._save();
  }

  winProbability(litSlots) {
    const probs = this.getLandingProbs();
    return litSlots.reduce((sum, s) => sum + (s >= 0 && s < NUM_SLOTS ? probs[s] : 0), 0);
  }

  optimalBet(multiplier, litSlots) {
    const pWin = this.winProbability(litSlots);
    if (this.priority === 'marbles') {
      return this._betForMarbles(multiplier, pWin);
    }
    return this._betForCards(multiplier);
  }

  recommend(multiplier, litSlots) {
    const pWin = this.winProbability(litSlots);
    const bet = this.optimalBet(multiplier, litSlots);
    const expectedMarbles = multiplier * bet * pWin;
    const expectedCards = pWin * Math.min(Math.floor(multiplier * bet / this.T), this.J);
    const roi = bet > 0 ? expectedMarbles / bet : 0;
    return {
      multiplier, litSlots,
      winProbability: +pWin.toFixed(4),
      optimalBet: bet,
      expectedMarbleReturn: +expectedMarbles.toFixed(2),
      expectedScoreCards: +expectedCards.toFixed(4),
      marbleRoi: +roi.toFixed(4),
    };
  }

  static expectedValueTable(T, J) {
    const rows = [];
    for (const [mult, nLit] of Object.entries(MULT_SLOTS).sort((a,b) => a[0]-b[0])) {
      const m = parseInt(mult);
      const pWin = nLit / NUM_SLOTS;
      const evRatio = m * pWin;
      const nCard = Math.max(MIN_BET, Math.min(MAX_BET, Math.ceil(T * J / m)));
      const cardsPerMarble = nCard > 0 ? pWin * Math.min(Math.floor(m * nCard / T), J) / nCard : 0;
      rows.push({
        multiplier: m, litSlots: nLit,
        pWin: +pWin.toFixed(4),
        marbleEvRatio: +evRatio.toFixed(4),
        cardOptimalBet: nCard,
        cardsPerMarble: +cardsPerMarble.toFixed(4),
      });
    }
    return rows;
  }

  _betForMarbles(multiplier, pWin) {
    return (multiplier * pWin > 1.0) ? MAX_BET : MIN_BET;
  }

  _betForCards(multiplier) {
    const nOptimal = Math.ceil(this.T * this.J / multiplier);
    return Math.max(MIN_BET, Math.min(MAX_BET, nOptimal));
  }

  // ── Persistence via localStorage (per machine) ──
  _save() {
    if (!currentMachineId) return;
    try {
      localStorage.setItem('pb_state_' + currentMachineId, JSON.stringify({
        T: this.T, J: this.J, priority: this.priority,
        priorWeight: this.priorWeight,
        landingCounts: this.landingCounts,
        totalPlays: this.totalPlays,
      }));
    } catch(e) {}
  }

  static load(machineId) {
    try {
      const raw = localStorage.getItem('pb_state_' + machineId);
      if (!raw) return null;
      const d = JSON.parse(raw);
      const s = new PinballStrategy(d.T, d.J, d.priority, d.priorWeight);
      s.landingCounts = d.landingCounts;
      s.totalPlays = d.totalPlays;
      return s;
    } catch(e) { return null; }
  }
}

// ═══════════════════════════════════════════════════════════════════
// Machine Management
// ═══════════════════════════════════════════════════════════════════
function getMachines() {
  try {
    const raw = localStorage.getItem('pb_machines');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveMachines(machines) {
  try { localStorage.setItem('pb_machines', JSON.stringify(machines)); } catch(e) {}
}

function addMachine() {
  const input = document.getElementById('newMachineName');
  const name = input.value.trim();
  if (!name) { showToast('请输入机器名称'); return; }
  const machines = getMachines();
  if (machines.some(m => m.id === name)) { showToast('该名称已存在'); return; }
  machines.push({ id: name, createdAt: new Date().toLocaleString() });
  saveMachines(machines);
  input.value = '';
  renderMachineList();
  showToast('已添加: ' + name);
}

function deleteMachine(id) {
  if (!confirm('确定删除机器「' + id + '」及其所有数据？')) return;
  let machines = getMachines();
  machines = machines.filter(m => m.id !== id);
  saveMachines(machines);
  try {
    localStorage.removeItem('pb_state_' + id);
    localStorage.removeItem('pb_history_' + id);
  } catch(e) {}
  renderMachineList();
  showToast('已删除: ' + id);
}

function selectMachine(id) {
  currentMachineId = id;
  const s = PinballStrategy.load(id);
  if (s) {
    // Existing machine with data → go directly to game
    strategy = s;
    try {
      const h = localStorage.getItem('pb_history_' + id);
      if (h) gameHistory = JSON.parse(h);
      else gameHistory = [];
    } catch(e) { gameHistory = []; }
    showPanel('game');
    document.getElementById('configSummary').textContent =
      `[${id}] T=${s.T}  J=${s.J}  ${s.priority==='cards'?'积分卡优先':'珠子优先'}`;
    buildMultButtons();
    buildSlotGrid();
    buildRecordGrid();
    renderEVTable(PinballStrategy.expectedValueTable(s.T, s.J));
    refreshProbs();
    renderHistory();
  } else {
    // New machine, no data → go to setup
    gameHistory = [];
    showPanel('setup');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMachineList() {
  const machines = getMachines();
  const list = document.getElementById('machineList');
  const empty = document.getElementById('machineEmpty');
  if (machines.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = '';
  machines.forEach(m => {
    const safe = escHtml(m.id);
    const s = PinballStrategy.load(m.id);
    const detail = s
      ? `T=${s.T} J=${s.J} | ${s.priority==='cards'?'积分卡优先':'珠子优先'} | ${s.totalPlays} 局`
      : '尚未配置';
    const card = document.createElement('div');
    card.className = 'machine-card';
    card.innerHTML = `<div class="mc-info"><div class="mc-name">${safe}</div><div class="mc-detail">${detail}</div></div>`;
    card.addEventListener('click', () => selectMachine(m.id));
    const del = document.createElement('button');
    del.className = 'mc-del';
    del.textContent = '✕';
    del.addEventListener('click', ev => { ev.stopPropagation(); deleteMachine(m.id); });
    card.appendChild(del);
    list.appendChild(card);
  });
}

function showPanel(name) {
  document.getElementById('machinePanel').classList.add('hidden');
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('gamePanel').classList.add('hidden');
  document.getElementById('resultPanel').classList.add('hidden');
  if (name === 'machine') document.getElementById('machinePanel').classList.remove('hidden');
  if (name === 'setup') document.getElementById('setupPanel').classList.remove('hidden');
  if (name === 'game') {
    document.getElementById('gamePanel').classList.remove('hidden');
  }
}

// ═══════════════════════════════════════════════════════════════════
// UI Logic
// ═══════════════════════════════════════════════════════════════════
let strategy = null;
let currentMachineId = null;
let selectedMult = null;
let selectedLitSlots = new Set();
let recordSlotSelected = null;
let gameHistory = [];

// ── Migrate old single-machine data if present ──
(function migrateOldData() {
  try {
    const oldState = localStorage.getItem('pb_state');
    if (oldState) {
      const machines = getMachines();
      const migId = '默认机器';
      if (!machines.some(m => m.id === migId)) {
        machines.push({ id: migId, createdAt: new Date().toLocaleString() });
        saveMachines(machines);
      }
      localStorage.setItem('pb_state_' + migId, oldState);
      const oldHist = localStorage.getItem('pb_history');
      if (oldHist) localStorage.setItem('pb_history_' + migId, oldHist);
      localStorage.removeItem('pb_state');
      localStorage.removeItem('pb_history');
    }
  } catch(e) {}
})();

// ── Init: always show machine list ──
document.addEventListener('DOMContentLoaded', () => {
  renderMachineList();
  showPanel('machine');
});

function initMachine() {
  const T = parseInt(document.getElementById('inputT').value) || 30;
  const J = parseInt(document.getElementById('inputJ').value) || 3;
  const priority = document.getElementById('inputPriority').value;
  const prior = parseFloat(document.getElementById('inputPrior').value) || 24;

  if (T < 1 || J < 1) { showToast('T 和 J 必须 >= 1'); return; }
  if (!currentMachineId) { showToast('未选择机器'); return; }

  strategy = new PinballStrategy(T, J, priority, prior);
  strategy._save();
  gameHistory = [];
  try { localStorage.setItem('pb_history_' + currentMachineId, '[]'); } catch(e) {}

  showPanel('game');
  document.getElementById('configSummary').textContent =
    `[${currentMachineId}] T=${T}  J=${J}  ${priority==='cards'?'积分卡优先':'珠子优先'}`;

  buildMultButtons();
  buildSlotGrid();
  buildRecordGrid();
  renderEVTable(PinballStrategy.expectedValueTable(T, J));
  refreshProbs();
  renderHistory();
}

function resetSetup() {
  strategy = null;
  currentMachineId = null;
  gameHistory = [];
  renderMachineList();
  showPanel('machine');
}

// ── Multiplier buttons ──
function buildMultButtons() {
  const row = document.getElementById('multRow');
  row.innerHTML = '';
  for (const m of [2,4,6,8,10]) {
    const btn = document.createElement('div');
    btn.className = 'mult-btn';
    btn.textContent = m + 'x';
    btn.dataset.mult = m;
    btn.onclick = () => selectMult(m);
    row.appendChild(btn);
  }
}

function selectMult(m) {
  selectedMult = m;
  selectedLitSlots.clear();
  document.querySelectorAll('.mult-btn').forEach(b =>
    b.classList.toggle('selected', parseInt(b.dataset.mult) === m));
  document.getElementById('litCount').textContent = MULT_SLOTS[m];
  document.querySelectorAll('#slotGrid .slot-btn').forEach(b => b.classList.remove('selected'));
}

// ── Slot grids ──
function buildSlotGrid() {
  const grid = document.getElementById('slotGrid');
  grid.innerHTML = '';
  for (let i = 0; i < NUM_SLOTS; i++) {
    const btn = document.createElement('div');
    btn.className = 'slot-btn';
    btn.textContent = (i+1);
    btn.dataset.slot = i;
    btn.onclick = () => toggleSlot(i, btn);
    grid.appendChild(btn);
  }
}

function toggleSlot(i, btn) {
  if (!selectedMult) { showToast('请先选择倍数'); return; }
  const maxLit = MULT_SLOTS[selectedMult];
  if (selectedLitSlots.has(i)) {
    selectedLitSlots.delete(i);
    btn.classList.remove('selected');
  } else {
    if (selectedLitSlots.size >= maxLit) { showToast(`最多选 ${maxLit} 个`); return; }
    selectedLitSlots.add(i);
    btn.classList.add('selected');
  }
}

function buildRecordGrid() {
  const grid = document.getElementById('recordGrid');
  grid.innerHTML = '';
  for (let i = 0; i < NUM_SLOTS; i++) {
    const btn = document.createElement('div');
    btn.className = 'slot-btn';
    btn.textContent = (i+1);
    btn.dataset.slot = i;
    btn.onclick = () => {
      recordSlotSelected = i;
      grid.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  }
}

// ── Recommendation ──
let lastRec = null;

function getRecommendation() {
  if (!strategy) { showToast('请先设置参数'); return; }
  if (!selectedMult) { showToast('请先选择倍数'); return; }
  const needed = MULT_SLOTS[selectedMult];
  if (selectedLitSlots.size !== needed) {
    showToast(`请选择 ${needed} 个亮灯槽位`);
    return;
  }

  const litArr = [...selectedLitSlots];
  const rec = strategy.recommend(selectedMult, litArr);
  lastRec = rec;

  document.getElementById('resultPanel').classList.remove('hidden');
  document.getElementById('betAdvice').textContent = rec.optimalBet + ' 颗';
  document.getElementById('resWinProb').textContent = (rec.winProbability * 100).toFixed(2) + '%';
  document.getElementById('resExpMarbles').textContent = rec.expectedMarbleReturn.toFixed(2);
  document.getElementById('resExpCards').textContent = rec.expectedScoreCards.toFixed(4);
  document.getElementById('resROI').textContent = rec.marbleRoi.toFixed(4);

  const tip = document.getElementById('resTip');
  if (rec.marbleRoi > 1) {
    tip.className = 'tip tip-good';
    tip.textContent = '✓ 期望正收益！建议多投';
  } else if (Math.abs(rec.marbleRoi - 1) < 0.0001) {
    tip.className = 'tip tip-even';
    tip.textContent = '≈ 收支平衡';
  } else {
    if (strategy.priority === 'marbles') {
      tip.className = 'tip tip-bad';
      tip.textContent = '✗ 期望负收益，仅投最低数量';
    } else {
      tip.className = 'tip tip-bad';
      tip.textContent = '✗ 珠子期望亏损，但这是积分卡最优投珠数';
    }
  }

  recordSlotSelected = null;
  document.querySelectorAll('#recordGrid .slot-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('resultPanel').scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Record ──
function recordSlot() {
  if (recordSlotSelected === null) { showToast('请先选择落点槽位'); return; }
  strategy.recordLanding(recordSlotSelected);

  const isWin = lastRec && lastRec.litSlots.includes(recordSlotSelected);
  addHistory(lastRec ? lastRec.multiplier : selectedMult, recordSlotSelected, isWin, lastRec ? lastRec.optimalBet : MIN_BET);

  showToast(`✓ 已记录槽位 ${recordSlotSelected+1}（共 ${strategy.totalPlays} 局）`);
  refreshProbs();
  prepareNextRound();
}

function skipRecord() {
  showToast('已跳过记录');
  prepareNextRound();
}

function prepareNextRound() {
  document.getElementById('resultPanel').classList.add('hidden');
  selectedMult = null;
  selectedLitSlots.clear();
  lastRec = null;
  document.querySelectorAll('.mult-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('#slotGrid .slot-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('litCount').textContent = '-';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ── History ──
function addHistory(mult, slot, win, bet) {
  gameHistory.push({mult, slot: slot+1, win, bet, time: new Date().toLocaleTimeString()});
  if (currentMachineId) {
    try { localStorage.setItem('pb_history_' + currentMachineId, JSON.stringify(gameHistory)); } catch(e) {}
  }
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  if (gameHistory.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = gameHistory.slice().reverse().map((h, i) =>
    `<div class="history-item">
      <span>#${gameHistory.length - i} ${h.time} ${h.mult}x 投${h.bet}颗 → 槽${h.slot}</span>
      <span class="${h.win?'win':'lose'}">${h.win?'中奖✓':'未中'}</span>
    </div>`
  ).join('');
}

// ── Probability bars ──
function refreshProbs() {
  if (!strategy) return;
  const probs = strategy.getLandingProbs();
  const maxP = Math.max(...probs);
  const container = document.getElementById('probBars');
  container.innerHTML = '';
  probs.forEach((p, i) => {
    const widthPct = maxP > 0 ? (p / maxP * 100) : 0;
    const wrap = document.createElement('div');
    wrap.className = 'prob-bar-wrap';
    wrap.innerHTML = `
      <span class="prob-label">${i+1}</span>
      <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:3px;">
        <div class="prob-bar" style="width:${widthPct}%"></div>
      </div>
      <span class="prob-val">${(p*100).toFixed(1)}%</span>
    `;
    container.appendChild(wrap);
  });
  document.getElementById('probInfo').textContent =
    strategy.totalPlays > 0 ? `已统计 ${strategy.totalPlays} 局` : '尚无历史数据，使用均匀分布';
}

// ── EV Table ──
function renderEVTable(rows) {
  const tbody = document.querySelector('#evTable tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    const cls = r.marbleEvRatio >= 1 ? 'ev-good' : 'ev-bad';
    tr.innerHTML = `
      <td>${r.multiplier}x</td>
      <td>${r.litSlots}</td>
      <td>${(r.pWin*100).toFixed(1)}%</td>
      <td class="${cls}">${r.marbleEvRatio.toFixed(3)}</td>
      <td>${r.cardOptimalBet}</td>
      <td>${r.cardsPerMarble.toFixed(4)}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ── Toggle section ──
function toggleSection(header, contentId) {
  const content = document.getElementById(contentId);
  const hidden = content.style.display === 'none';
  content.style.display = hidden ? '' : 'none';
  header.classList.toggle('collapsed', !hidden);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Register Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
